<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esport Cloud Manager | Mareq1251</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🎮 Esport Cloud Manager</h1>

        <div class="card">
            <h3>➕ Dodaj Zawodnika</h3>
            <div class="grid-form">
                <input type="number" id="gracz_id" placeholder="ID Gracza">
                <input type="text" id="gracz_nick" placeholder="Pseudonim">
                <input type="text" id="gracz_kraj" placeholder="Kraj">
                <input type="number" id="gracz_rank" placeholder="Ranking">
                <button class="btn-full" id="btn-add">WYŚLIJ DO BAZY</button>
            </div>
        </div>

        <div class="card">
            <h3>📊 Przeglądarka Tabel</h3>
            
            <label for="table-select">Wybierz tabelę z bazy:</label>
            <select id="table-select">
                <option value="gracze">Gracze (Zawodnicy)</option>
                <option value="gry">Gry</option>
                <option value="druzyny">Drużyny (Zespoły)</option>
                <option value="turnieje">Turnieje</option>
                <option value="sponsorzy">Sponsorzy</option>
                <option value="uzytkownicy">Użytkownicy Systemu</option>
                
                <option value="mecze">Harmonogram Meczów</option>
                <option value="uczestnicy_meczu">Statystyki w meczach</option>
                <option value="nagrody">Nagrody i Pule</option>
                <option value="wyniki_koncowe">Wyniki końcowe turniejów</option>
                <option value="sklady_druzyn">Składy drużyn (Relacje)</option>
                <option value="platformy">Platformy sprzętowe</option>
                <option value="organizatorzy">Organizatorzy</option>
                <option value="turniej_spons">Sponsoring turniejów</option>
                <option value="rej_turniej">Rejestracje na turnieje</option>
            </select>

            <div id="status">Ładowanie...</div>
            
            <div class="table-container">
                <table id="dynamic-table">
                    <thead>
                        <tr id="table-headers"></tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js?v=4"></script>
</body>
</html>
