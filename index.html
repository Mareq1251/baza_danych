<div class="card">
    <h3>📊 Przeglądarka Tabel</h3>
    <div style="margin-bottom: 15px;">
        <label for="table-select" style="font-size: 14px; color: var(--main-color);">Wybierz tabelę:</label>
        <select id="table-select" style="background: #0f172a; color: white; padding: 10px; border-radius: 6px; border: 1px solid var(--border); width: 100%; margin-top: 5px;">
            <option value="gracze">Gracze</option>
            <option value="gry">Gry</option>
            <option value="druzyny">Drużyny</option>
            <option value="turnieje">Turnieje</option>
            <option value="sponsorzy">Sponsorzy</option>
        </select>
    </div>
    
    <div id="status">Baza online</div>
    
    <div class="table-container">
        <table id="dynamic-table">
            <thead>
                <tr id="table-headers">
                    </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>
</div>
