<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esport Cloud Manager | Mareq1251</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-overlay">
        <div class="card login-card">
            <h3>🔐 Logowanie do Systemu</h3>
            <input type="text" id="login-user" placeholder="Login (admin / widz)">
            <input type="password" id="login-pass" placeholder="Hasło (tylko dla admina)">
            <button class="btn-full" onclick="handleLogin()">ZALOGUJ</button>
            <p id="login-msg" style="color: #ff4d4d; font-size: 12px; margin-top: 10px;"></p>
        </div>
    </div>

    <div class="container" id="main-content" style="display: none;">
        <h1>🎮 Esport Cloud Manager</h1>

        <div class="card" id="admin-panel" style="display: none;">
            <h3>➕ Dodaj rekord do: <span id="current-table-name">Tabela</span></h3>
            <div id="dynamic-form" class="grid-form">
                </div>
            <button class="btn-full" style="margin-top: 15px;" onclick="wyslijDane()">ZAPISZ W BAZIE</button>
        </div>

        <div class="card">
            <div class="header-flex">
                <h3>📊 Przeglądarka Tabel</h3>
                <button onclick="handleLogout()" class="btn-logout">Wyloguj</button>
            </div>
            
            <label>Wybierz tabelę:</label>
            <select id="table-select">
                <option value="gracze">Gracze</option>
                <option value="druzyny">Drużyny</option>
                <option value="gry">Gry</option>
                <option value="turnieje">Turnieje</option>
                <option value="sponsorzy">Sponsorzy</option>
                <option value="uzytkownicy">Użytkownicy</option>
                <option value="mecze">Mecze</option>
                <option value="nagrody">Nagrody</option>
            </select>

            <div id="status">Baza online</div>
            
            <div class="table-container">
                <table id="dynamic-table">
                    <thead><tr id="table-headers"></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js?v=6"></script>
</body>
</html>
